<!DOCTYPE html>
<html>
<head>
    <title>YT Downloader Pro</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .box {
            margin: 80px auto;
            width: 420px;
            padding: 30px;
            border-radius: 20px;
            background: #111827;
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 15px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
            margin: 5px;
        }

        button:hover {
            background: #2563eb;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .formats {
            margin-top: 10px;
        }

        #status {
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ YT Downloader Pro</h2>

    <input id="url" placeholder="Paste YouTube URL">

    <button onclick="preview()">Preview</button>

    <div id="previewBox"></div>

    <div class="formats" id="formatsBox"></div>

    <button onclick="downloadMP3()">🎵 Download MP3</button>

    <p id="status"></p>
</div>

<script>
let currentUrl = "";

function preview(){
    let url = document.getElementById("url").value;
    currentUrl = url;

    fetch("/info?url=" + url)
    .then(res => res.json())
    .then(data => {

        if(data.error){
            document.getElementById("status").innerText = data.error;
            return;
        }

        document.getElementById("previewBox").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}">
        `;

        let html = "";

        data.formats.forEach(f => {
            html += `<button onclick="downloadVideo('${f.height}')">${f.quality}</button>`;
        });

        document.getElementById("formatsBox").innerHTML = html;
    });
}

function downloadVideo(quality){
    startDownload("video", quality);
}

function downloadMP3(){
    startDownload("mp3", "128");
}

function startDownload(type, quality){
    fetch("/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            url: currentUrl,
            type: type,
            quality: quality
        })
    })
    .then(res => res.json())
    .then(data => {
        track(data.id);
    });
}

function track(id){
    let interval = setInterval(() => {
        fetch("/progress/" + id)
        .then(res => res.json())
        .then(data => {

            document.getElementById("status").innerText =
                data.percent + " " + data.speed;

            if(data.percent === "100%"){
                clearInterval(interval);
                window.location = "/file/" + id;
            }

            if(data.percent === "error"){
                clearInterval(interval);
            }
        });
    }, 1000);
}
</script>

</body>
</html>
