<!DOCTYPE html>
<html>
<head>
<title>YT Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex justify-center items-center min-h-screen">

<div class="bg-gray-900 p-6 rounded-xl w-full max-w-xl">

<h1 class="text-2xl mb-4 text-center">YT Downloader</h1>

<input id="url" class="w-full p-2 text-black" placeholder="Paste URL">

<button onclick="preview()" class="bg-blue-500 w-full mt-3 p-2">Preview</button>

<div id="preview" class="hidden mt-4 text-center">
<img id="thumb" class="mx-auto mb-2">
<p id="title"></p>

<button onclick="download('mp3','320')" class="bg-yellow-500 mt-2 p-2">MP3</button>
<button onclick="download('video','720')" class="bg-green-500 mt-2 p-2">Video</button>

<div class="mt-3">
<div class="bg-gray-700 h-3">
<div id="bar" class="bg-blue-500 h-3" style="width:0%"></div>
</div>
<p id="percent"></p>
</div>

</div>

</div>

<script>
async function preview(){
let url = document.getElementById("url").value;

let res = await fetch("/info?url="+url);
let data = await res.json();

if(data.error){ alert(data.error); return; }

document.getElementById("preview").classList.remove("hidden");
document.getElementById("thumb").src = data.thumbnail;
document.getElementById("title").innerText = data.title;
}

async function download(type, quality){
let url = document.getElementById("url").value;

let res = await fetch("/download", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify({url,type,quality})
});

let data = await res.json();
track(data.id);
}

function track(id){
let i = setInterval(async()=>{
let res = await fetch("/progress/"+id);
let d = await res.json();

let p = parseFloat(d.percent)||0;

document.getElementById("bar").style.width=p+"%";
document.getElementById("percent").innerText=d.percent;

if(p>=100){
clearInterval(i);
window.location="/file/"+id;
}

},1000);
}
</script>

</body>
</html>
