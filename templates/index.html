<!DOCTYPE html>
<html>
<head>
    <title>YT Downloader Pro</title>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a, #020617);
            font-family: Arial;
            color: white;
            text-align: center;
        }

        .box {
            margin: 100px auto;
            width: 400px;
            padding: 30px;
            border-radius: 20px;
            background: #111827;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }

        .btns button {
            margin: 5px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>⚡ YT Downloader Pro</h2>

    <input id="url" placeholder="Paste YouTube URL">

    <button onclick="preview()">Preview</button>

    <div id="previewBox"></div>

    <div class="btns" id="downloadBtns" style="display:none;">
        <button onclick="download('video','max')">MAX</button>
        <button onclick="download('video','1080')">1080p</button>
        <button onclick="download('video','720')">720p</button>
        <button onclick="download('mp3','128')">MP3</button>
    </div>

    <p id="status"></p>
</div>

<script>
function preview(){
    let url = document.getElementById("url").value;

    fetch("/info?url=" + url)
    .then(res => res.json())
    .then(data => {
        if(data.error){
            document.getElementById("status").innerText = data.error;
            return;
        }

        document.getElementById("previewBox").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}">
        `;

        document.getElementById("downloadBtns").style.display = "block";
    });
}

function download(type, quality){
    let url = document.getElementById("url").value;

    fetch("/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            url: url,
            type: type,
            quality: quality
        })
    })
    .then(res => res.json())
    .then(data => {
        checkProgress(data.id);
    });
}

function checkProgress(id){
    let interval = setInterval(() => {
        fetch("/progress/" + id)
        .then(res => res.json())
        .then(data => {
            document.getElementById("status").innerText =
                data.percent + " " + data.speed;

            if(data.percent === "100%"){
                clearInterval(interval);
                window.location = "/file/" + id;
            }

            if(data.percent === "error"){
                clearInterval(interval);
            }
        });
    }, 1000);
}
</script>

</body>
</html>
