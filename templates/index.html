<!DOCTYPE html>
<html>
<head>
    <title>YT Downloader Pro</title>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: Arial;
            text-align: center;
            padding: 40px;
        }

        input, select {
            padding: 12px;
            margin: 10px;
            width: 300px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 12px 20px;
            background: #3b82f6;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
        }

        img {
            margin-top: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>⚡ YT Downloader Pro</h1>

<input type="text" id="url" placeholder="Paste YouTube URL"><br>

<button onclick="getInfo()">Preview</button>

<div id="info"></div>

<br>

<select id="type">
    <option value="mp4">Video</option>
    <option value="mp3">Audio</option>
</select>

<select id="quality">
    <option value="max">Best</option>
    <option value="720">720p</option>
    <option value="480">480p</option>
    <option value="128">128kbps (mp3)</option>
</select>

<br>

<button onclick="startDownload()">Download</button>

<p id="progress"></p>

<script>
function getInfo() {
    let url = document.getElementById("url").value;

    fetch(`/info?url=${url}`)
    .then(res => res.json())
    .then(data => {
        if(data.error){
            alert(data.error);
            return;
        }

        document.getElementById("info").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}" width="300">
            <p>${data.uploader}</p>
        `;
    });
}

function startDownload() {
    let url = document.getElementById("url").value;
    let type = document.getElementById("type").value;
    let quality = document.getElementById("quality").value;

    fetch('/download', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({url, type, quality})
    })
    .then(res => res.json())
    .then(data => {
        checkProgress(data.id);
    });
}

function checkProgress(id) {
    let interval = setInterval(() => {
        fetch(`/progress/${id}`)
        .then(res => res.json())
        .then(data => {
            document.getElementById("progress").innerText =
                data.percent + " " + data.speed;

            if(data.percent === "100%"){
                clearInterval(interval);
                window.location = `/file/${id}`;
            }
        });
    }, 1000);
}
</script>

</body>
</html>
