<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Downloader Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    margin-top: 120px;
}

input {
    width: 420px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
}

button {
    margin-top: 15px;
    padding: 10px 18px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 14px;
}

button:hover {
    background: #2563eb;
}

img {
    margin-top: 20px;
    width: 300px;
    border-radius: 10px;
}

#status {
    margin-top: 20px;
    color: #f87171;
}
</style>
</head>

<body>

<div class="container">

<h1>⚡ YT Downloader Pro</h1>

<input id="url" placeholder="Paste YouTube URL here"><br>

<button onclick="preview()">Preview</button>

<div id="result"></div>

<br>

<button onclick="downloadVideo()">Download Video</button>
<button onclick="downloadMP3()">Download MP3</button>

<p id="status"></p>

</div>

<script>

function preview() {
    let url = document.getElementById("url").value;

    document.getElementById("status").innerText = "Loading preview...";

    fetch('/preview', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'url=' + encodeURIComponent(url)
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("status").innerText = data.error;
        } else {
            document.getElementById("status").innerText = "";

            document.getElementById("result").innerHTML =
                "<h3>" + data.title + "</h3>" +
                "<img src='" + data.thumbnail + "'>";
        }
    })
    .catch(err => {
        document.getElementById("status").innerText = "Error: " + err;
    });
}


function downloadVideo() {
    sendDownload('video');
}

function downloadMP3() {
    sendDownload('mp3');
}

function sendDownload(type) {
    let url = document.getElementById("url").value;

    document.getElementById("status").innerText = "Downloading...";

    fetch('/download', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'url=' + encodeURIComponent(url) + '&format=' + type
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("status").innerText = data.error;
        } else {
            document.getElementById("status").innerText = "Download completed!";
        }
    })
    .catch(err => {
        document.getElementById("status").innerText = "Error: " + err;
    });
}

</script>

</body>
</html>
