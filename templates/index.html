<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YT Downloader Pro</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    margin-top: 100px;
}

input {
    width: 400px;
    padding: 12px;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    margin: 10px;
}

.progress {
    width: 400px;
    height: 10px;
    background: #333;
    margin: 20px auto;
    border-radius: 5px;
}

.bar {
    height: 100%;
    width: 0%;
    background: lime;
}
</style>
</head>

<body>

<div class="container">
    <h1>⚡ YT Downloader Pro</h1>

    <input id="url" placeholder="Paste YouTube URL"><br>
    <button onclick="preview()">Preview</button>

    <div id="info"></div>

    <button onclick="download('video')">Download Video</button>
    <button onclick="download('mp3')">Download MP3</button>

    <div class="progress">
        <div class="bar" id="bar"></div>
    </div>

    <div id="status"></div>
</div>

<script>
let currentId = null;

function preview() {
    let url = document.getElementById("url").value;

    fetch(`/info?url=${encodeURIComponent(url)}`)
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            document.getElementById("info").innerText = data.error;
            return;
        }

        document.getElementById("info").innerHTML = `
            <h3>${data.title}</h3>
            <img src="${data.thumbnail}" width="300">
        `;
    });
}

function download(type) {
    let url = document.getElementById("url").value;

    fetch("/download", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({url: url, type: type})
    })
    .then(res => res.json())
    .then(data => {
        currentId = data.id;
        checkProgress();
    });
}

function checkProgress() {
    if (!currentId) return;

    fetch(`/progress/${currentId}`)
    .then(res => res.json())
    .then(data => {
        document.getElementById("bar").style.width = data.percent;
        document.getElementById("status").innerText = data.percent + " " + data.speed;

        if (data.percent === "100%") {
            window.location = `/file/${currentId}`;
        } else if (data.percent !== "error") {
            setTimeout(checkProgress, 1000);
        } else {
            document.getElementById("status").innerText = data.speed;
        }
    });
}
</script>

</body>
</html>
